name: Keep Supabase Active

on:
  schedule:
    # Run at 00:00 every Monday, Wednesday, and Friday
    - cron: '0 0 * * 1,3,5'
  workflow_dispatch: # Allows you to run this workflow manually from the Actions tab

jobs:
  keep-alive:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase API
        run: |
          curl -s -X GET "${{ secrets.VITE_SUPABASE_URL }}/auth/v1/settings" \
            -H "apikey: ${{ secrets.VITE_SUPABASE_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.VITE_SUPABASE_ANON_KEY }}"
          curl -s -X GET "${{ secrets.VITE_SUPABASE_URL }}/rest/v1/keep_alive?limit=1" \
            -H "apikey: ${{ secrets.VITE_SUPABASE_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.VITE_SUPABASE_ANON_KEY }}"
